name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - codex/**

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bun-workspace:
    name: Bun workspace checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check diff whitespace
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          if [ -n "${BASE_SHA:-}" ] && ! [[ "$BASE_SHA" =~ ^0+$ ]]; then
            git diff --check "$BASE_SHA" HEAD
          else
            git diff-tree --check --root --no-commit-id -r HEAD
          fi

      - name: Test shared contracts
        run: |
          bun test packages/shared
          bun run --filter ./packages/shared typecheck

      - name: Test sidecar API
        run: |
          bun test sidecars/api
          bun run --filter ./sidecars/api typecheck

      - name: Test visual engine
        run: |
          bun test packages/visual-engine
          bun run --filter ./packages/visual-engine typecheck

      - name: Test web app
        run: |
          bun test apps/web
          bun run --filter ./apps/web typecheck
          bun run web:build

      - name: Run policy checks
        run: |
          bun run tauri-stack-policy:check
          bun run app-data-policy:check
          bun run sidecar-runtime-policy:check
          bun run main-flow-policy:check
          bun run release-identity:check
          bun run release-csp:check
          bun run installer-policy:check
          bun run updater-policy:check
          bun run release-notes-policy:check
          bun run frontend-debug-log-policy:check
          bun run ai-depth-remote-policy:check
          bun run license:check
          bun run license-transitive:check
          bun run packaged-notices:check

      - name: Check legacy baseline syntax
        run: node --check server.js

  tauri-rust:
    name: Tauri Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cargo test
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --locked

      - name: Cargo check
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --locked
