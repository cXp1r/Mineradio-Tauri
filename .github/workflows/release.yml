name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-windows:
    name: Build and publish Windows updater release
    runs-on: windows-2022
    environment: production-release
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Cache Bun install cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-1.3.14-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-1.3.14-

      - name: Install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & bun install --frozen-lockfile
          if ($LASTEXITCODE -ne 0) {
            throw "安装依赖失败"
          }

      - name: Verify release version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & bun run release:verify-version -- "$env:GITHUB_REF_NAME"
          if ($LASTEXITCODE -ne 0) {
            throw "发布版本校验失败"
          }

      - name: Verify release source and uniqueness
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          $expectedSha = $env:GITHUB_SHA
          $repository = $env:GITHUB_REPOSITORY
          $tag = $env:GITHUB_REF_NAME

          $headOutput = @(& git rev-parse HEAD)
          if ($LASTEXITCODE -ne 0) {
            throw "读取本地 HEAD 失败"
          }

          $headSha = ($headOutput -join "").Trim()
          if ($headSha -cne $expectedSha) {
            throw "本地 HEAD $headSha 与触发提交 $expectedSha 不一致"
          }

          $remoteTagOutput = @(& gh api "repos/$repository/commits/$tag" --jq ".sha")
          if ($LASTEXITCODE -ne 0) {
            throw "解析远端 tag 提交失败"
          }

          $remoteTagSha = ($remoteTagOutput -join "").Trim()
          if ($remoteTagSha -cne $expectedSha) {
            throw "远端 tag 提交 $remoteTagSha 与触发提交 $expectedSha 不一致"
          }

          $releaseTags = @(& gh api --paginate "repos/$repository/releases?per_page=100" --jq ".[].tag_name")
          if ($LASTEXITCODE -ne 0) {
            throw "读取远端 Release 列表失败"
          }

          if ($releaseTags -ccontains $tag) {
            throw "Release $tag 已存在，禁止覆盖"
          }

      - name: Install Rust 1.95.0
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          & rustup toolchain install 1.95.0 --profile minimal --component clippy --component rustfmt
          if ($LASTEXITCODE -ne 0) {
            throw "安装 Rust 1.95.0 失败"
          }

          & rustup default 1.95.0
          if ($LASTEXITCODE -ne 0) {
            throw "切换 Rust 1.95.0 失败"
          }

          $rustVersionOutput = @(& rustc --version)
          if ($LASTEXITCODE -ne 0) {
            throw "读取 Rust 版本失败"
          }

          $rustVersion = ($rustVersionOutput -join "").Trim()
          if ($rustVersion -notmatch '^rustc 1\.95\.0(?:\s|$)') {
            throw "Rust 版本不匹配: $rustVersion"
          }

      - name: Cache Cargo downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-downloads-${{ runner.os }}-1.95.0-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-downloads-${{ runner.os }}-1.95.0-

      - name: Typecheck workspace
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & bun run typecheck
          if ($LASTEXITCODE -ne 0) {
            throw "类型检查失败"
          }

      - name: Test workspace
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & bun run test
          if ($LASTEXITCODE -ne 0) {
            throw "Bun 测试失败"
          }

      - name: Build web app for Tauri checks
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & bun run web:build
          if ($LASTEXITCODE -ne 0) {
            throw "构建 Web 应用失败"
          }

      - name: Validate Cargo metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & cargo metadata --manifest-path apps/desktop/src-tauri/Cargo.toml --locked --format-version 1 --no-deps
          if ($LASTEXITCODE -ne 0) {
            throw "Cargo metadata 校验失败"
          }

      - name: Check Rust formatting
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml --all -- --check
          if ($LASTEXITCODE -ne 0) {
            throw "Rust 格式校验失败"
          }

      - name: Lint Rust targets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets --all-features --locked -- -D warnings
          if ($LASTEXITCODE -ne 0) {
            throw "Rust Clippy 校验失败"
          }

      - name: Test Rust workspace
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --locked
          if ($LASTEXITCODE -ne 0) {
            throw "Rust 测试失败"
          }

      - name: Build signed NSIS bundle
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          & bun run --filter ./apps/desktop tauri build --bundles nsis --ci -- --locked
          if ($LASTEXITCODE -ne 0) {
            throw "签名 NSIS 构建失败"
          }

      - name: Validate artifacts and create updater manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $tag = $env:GITHUB_REF_NAME
          $repository = $env:GITHUB_REPOSITORY
          $version = $tag.Substring(1)
          $bundleDirectory = Join-Path $env:GITHUB_WORKSPACE "apps/desktop/src-tauri/target/release/bundle/nsis"
          $exeName = "MineRadio-Tauri_${version}_x64-setup.exe"
          $exePath = Join-Path $bundleDirectory $exeName
          $signaturePath = Join-Path $bundleDirectory "$exeName.sig"
          $manifestPath = Join-Path $env:RUNNER_TEMP "latest.json"

          foreach ($artifactPath in @($exePath, $signaturePath)) {
            if (-not (Test-Path -LiteralPath $artifactPath -PathType Leaf)) {
              throw "发布资产不存在或不是文件: $artifactPath"
            }

            $artifact = Get-Item -LiteralPath $artifactPath
            if ($artifact.Length -le 0) {
              throw "发布资产为空: $artifactPath"
            }
          }

          & bun run release:create-manifest -- $tag $repository $exePath $signaturePath $manifestPath
          if ($LASTEXITCODE -ne 0) {
            throw "创建 updater manifest 失败"
          }

          if (-not (Test-Path -LiteralPath $manifestPath -PathType Leaf)) {
            throw "updater manifest 不存在或不是文件: $manifestPath"
          }

          $manifestFile = Get-Item -LiteralPath $manifestPath
          if ($manifestFile.Length -le 0) {
            throw "updater manifest 为空: $manifestPath"
          }

          $signature = Get-Content -LiteralPath $signaturePath -Encoding UTF8 -Raw
          $manifestText = Get-Content -LiteralPath $manifestPath -Encoding UTF8 -Raw
          $manifest = $manifestText | ConvertFrom-Json

          if ($manifest.version -cne $version) {
            throw "updater manifest 版本不匹配"
          }

          if ($null -eq $manifest.platforms) {
            throw "updater manifest 缺少 platforms"
          }

          $expectedPlatforms = @("windows-x86_64-nsis", "windows-x86_64")
          $actualPlatforms = @($manifest.platforms.PSObject.Properties.Name)
          $platformDifference = @(Compare-Object -ReferenceObject $expectedPlatforms -DifferenceObject $actualPlatforms -CaseSensitive)
          if ($platformDifference.Count -ne 0) {
            throw "updater manifest 平台集合不匹配"
          }

          $expectedUrl = "https://github.com/$repository/releases/download/$tag/$exeName"
          foreach ($platformName in $expectedPlatforms) {
            $platform = $manifest.platforms.PSObject.Properties[$platformName].Value
            if ($platform.signature -cne $signature) {
              throw "updater manifest 的 $platformName 签名未原样保留"
            }

            if ($platform.url -cne $expectedUrl) {
              throw "updater manifest 的 $platformName URL 不匹配"
            }
          }

      - name: Create, verify, and publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          $expectedSha = $env:GITHUB_SHA
          $repository = $env:GITHUB_REPOSITORY
          $tag = $env:GITHUB_REF_NAME
          $version = $tag.Substring(1)
          $bundleDirectory = Join-Path $env:GITHUB_WORKSPACE "apps/desktop/src-tauri/target/release/bundle/nsis"
          $exeName = "MineRadio-Tauri_${version}_x64-setup.exe"
          $signatureName = "$exeName.sig"
          $exePath = Join-Path $bundleDirectory $exeName
          $signaturePath = Join-Path $bundleDirectory $signatureName
          $manifestPath = Join-Path $env:RUNNER_TEMP "latest.json"

          $remoteTagOutput = @(& gh api "repos/$repository/commits/$tag" --jq ".sha")
          if ($LASTEXITCODE -ne 0) {
            throw "发布前再次解析远端 tag 提交失败"
          }

          $remoteTagSha = ($remoteTagOutput -join "").Trim()
          if ($remoteTagSha -cne $expectedSha) {
            throw "发布前远端 tag 提交 $remoteTagSha 与触发提交 $expectedSha 不一致"
          }

          & gh release create $tag --repo $repository --draft --verify-tag --generate-notes --title "MineRadio-Tauri $tag"
          if ($LASTEXITCODE -ne 0) {
            throw "创建草稿 Release 失败；同名 Release 不允许覆盖"
          }

          & gh release upload $tag $exePath $signaturePath $manifestPath --repo $repository
          if ($LASTEXITCODE -ne 0) {
            throw "上传 Release 资产失败；草稿将保留以便检查"
          }

          $releaseJsonLines = @(& gh release view $tag --repo $repository --json tagName,isDraft,isPrerelease,assets)
          if ($LASTEXITCODE -ne 0) {
            throw "读取草稿 Release 失败"
          }

          $releaseJson = $releaseJsonLines -join "`n"
          $release = $releaseJson | ConvertFrom-Json

          if ($release.tagName -cne $tag) {
            throw "草稿 Release tag 不匹配"
          }

          if ($release.isDraft -ne $true) {
            throw "Release 在验证完成前不是草稿"
          }

          if ($release.isPrerelease -ne $false) {
            throw "Release 被错误标记为预发布"
          }

          $assets = @($release.assets)
          if ($assets.Count -ne 3) {
            throw "Release 资产数量必须恰好为 3，实际为 $($assets.Count)"
          }

          $expectedAssetNames = @($exeName, $signatureName, "latest.json")
          $actualAssetNames = @($assets | ForEach-Object { $_.name })
          $assetDifference = @(Compare-Object -ReferenceObject $expectedAssetNames -DifferenceObject $actualAssetNames -CaseSensitive)
          if ($assetDifference.Count -ne 0) {
            throw "Release 资产名称集合不匹配"
          }

          foreach ($asset in $assets) {
            if ($null -eq $asset.size -or [int64]$asset.size -le 0) {
              throw "Release 资产为空: $($asset.name)"
            }
          }

          & gh release edit $tag --repo $repository --draft=false --latest
          if ($LASTEXITCODE -ne 0) {
            throw "公开 Release 失败；请检查草稿状态"
          }
